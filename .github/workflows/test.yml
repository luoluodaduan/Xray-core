name: Update

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check Out
        uses: actions/checkout@v7

      - name: Initialization Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt-get -yqq update
          sudo -E apt-get -yqq autoremove --purge
          sudo -E apt-get -yqq clean

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Setup Protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '33.6'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare
        run: |
          rm -rf .github/dependabot.yml
          rm -rf .github/workflows/docker.yml
          rm -rf .github/workflows/release-win7.yml
          rm -rf .github/workflows/scheduled-assets-update.yml
          find . -name 'go.mod' | xargs -r perl -pi -e 's|/xtls/xray-core|/luoluodaduan/xray-core|g'
          find . -name '*.go' | xargs -r perl -pi -e 's|/xtls/xray-core|/luoluodaduan/xray-core|g'
          find . -name '*.proto' | xargs -r perl -pi -e 's|/xtls/xray-core|/luoluodaduan/xray-core|g'

      - name: Update
        run: |
          go install mvdan.cc/gofumpt@latest
          go install github.com/daixiang0/gci@latest
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          go run ./infra/vformat
          go run ./infra/vprotogen
          find . -name '*.pb.go' | xargs -r gci write -s standard -s default
          go mod tidy

      - name: Commit Files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "$(date '+%Y-%m-%d')"

      - name: Push Changes
        uses: ad-m/github-push-action@master
        with:
          branch: ${{ github.ref }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
